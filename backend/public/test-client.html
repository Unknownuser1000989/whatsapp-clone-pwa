<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Clone</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --wa-green: #00a884;
            --wa-bg: #f0f2f5;
            --wa-header: #00a884;
            --wa-sidebar: #ffffff;
            --wa-bubble-me: #dcf8c6;
            --wa-bubble-other: #ffffff;
            --wa-text: #111b21;
            --wa-text-secondary: #667781;
            --wa-border: #e9edef;
            --wa-hover: #f5f6f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: var(--wa-bg);
            color: var(--wa-text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #app {
            width: 100%;
            max-width: 1400px;
            height: 95vh;
            background: #fff;
            display: flex;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.1);
            position: relative;
        }

        /* Login Screen */
        #login-screen {
            position: absolute;
            inset: 0;
            background: var(--wa-bg);
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .login-header {
            height: 220px;
            background: var(--wa-header);
            width: 100%;
        }

        .login-card {
            background: white;
            padding: 40px;
            width: 450px;
            margin: -100px auto 0;
            box-shadow: 0 17px 50px 0 rgba(11, 20, 26, .19), 0 12px 15px 0 rgba(11, 20, 26, .24);
            border-radius: 3px;
            text-align: center;
        }

        .login-card h2 {
            color: #41525d;
            margin-bottom: 30px;
        }

        .login-card input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #e9edef;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 16px;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: var(--wa-green);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }

        /* Main Chat Layout */
        #main-chat {
            display: none;
            width: 100%;
            height: 100%;
        }

        .sidebar {
            width: 400px;
            border-right: 1px solid var(--wa-border);
            display: flex;
            flex-direction: column;
            background: var(--wa-sidebar);
        }

        .sidebar-header {
            background: #f0f2f5;
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
            box-sizing: border-box;
        }

        .user-profile {
            font-weight: 600;
            color: var(--wa-text);
        }

        .contact-list {
            flex: 1;
            overflow-y: auto;
        }

        .contact-item {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            border-bottom: 1px solid #f5f6f6;
            transition: background 0.2s;
            position: relative;
        }

        .contact-item:hover {
            background: var(--wa-hover);
        }

        .contact-item.active {
            background: var(--wa-hover);
        }

        .unread-badge {
            background: var(--wa-green);
            color: white;
            font-size: 12px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: absolute;
            right: 20px;
            bottom: 15px;
            font-weight: 600;
        }

        .contact-avatar {
            width: 49px;
            height: 49px;
            background: #dfe5e7;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #54656f;
            font-weight: 600;
        }

        .contact-info {
            flex: 1;
            overflow: hidden;
        }

        .contact-name {
            font-weight: 600;
            margin-bottom: 2px;
        }

        .contact-phone {
            font-size: 13px;
            color: var(--wa-text-secondary);
        }

        .chat-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #efe7de;
            position: relative;
        }

        .chat-header {
            background: #f0f2f5;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            height: 60px;
            box-sizing: border-box;
            border-bottom: 1px solid var(--wa-border);
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 40px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .msg {
            max-width: 65%;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 14.5px;
            line-height: 19px;
            position: relative;
            box-shadow: 0 1px 0.5px rgba(11, 20, 26, .13);
        }

        .msg.me {
            align-self: flex-end;
            background: var(--wa-bubble-me);
        }

        .msg.other {
            align-self: flex-start;
            background: var(--wa-bubble-other);
        }

        .msg-footer {
            font-size: 11px;
            color: var(--wa-text-secondary);
            text-align: right;
            margin-top: 4px;
        }

        .input-area {
            background: #f0f2f5;
            padding: 10px 16px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .input-area input {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            outline: none;
        }

        .empty-chat {
            position: absolute;
            inset: 0;
            background: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #41525d;
            border-bottom: 6px solid var(--wa-green);
        }

        .empty-chat h1 {
            font-size: 32px;
            font-weight: 300;
            margin-bottom: 15px;
        }

        .id-copy {
            font-size: 11px;
            background: #e9edef;
            padding: 2px 6px;
            border-radius: 3px;
            cursor: pointer;
            margin-left: 10px;
        }

        .hidden {
            display: none !important;
        }

        /* Error Banner */
        #error-banner {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: #fef2f2;
            color: #dc2626;
            padding: 10px;
            text-align: center;
            font-size: 14px;
            z-index: 1000;
            display: none;
            border-bottom: 1px solid #fecaca;
        }
    </style>
</head>

<body>
    <div id="error-banner"></div>

    <div id="app">
        <!-- Login Screen -->
        <div id="login-screen">
            <div class="login-header"></div>
            <div class="login-card">
                <h2>WhatsApp Login</h2>
                <input id="phone" placeholder="Phone Number" value="1234567890">
                <input id="password" type="password" placeholder="Password" value="password123">
                <button class="login-btn" onclick="login()">LOGIN</button>
                <div style="margin-top: 15px; font-size: 14px; color: #667781;">
                    New user? <a href="#" onclick="register()" style="color: var(--wa-green);">Register here</a>
                </div>
            </div>
        </div>

        <!-- Main Chat -->
        <div id="main-chat">
            <div class="sidebar">
                <div class="sidebar-header">
                    <div id="user-display" class="user-profile">My Name</div>
                    <button class="id-copy" onclick="copyMyId()">Copy My ID</button>
                </div>

                <div style="padding: 10px 16px; background: white; border-bottom: 1px solid var(--wa-border);">
                    <div style="font-size: 13px; color: var(--wa-green); font-weight: 600; margin-bottom: 8px;">SEARCH
                        CONTACT</div>
                    <div style="display: flex; gap: 5px;">
                        <input id="searchPhone" placeholder="Enter phone number"
                            style="flex:1; padding:8px; border:1px solid #eee; border-radius:5px; font-size:13px;">
                        <button class="login-btn" style="width: auto; padding: 5px 10px; margin: 0; font-size: 12px;"
                            onclick="searchUser()">FIND</button>
                    </div>
                </div>

                <div style="padding: 10px 16px; background: white; flex: 1; display: flex; flex-direction: column;">
                    <div
                        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                        <div style="font-size: 13px; color: var(--wa-green); font-weight: 600;">ACTIVE CONVERSATIONS
                        </div>
                        <button class="id-copy" style="margin: 0; font-size: 10px;"
                            onclick="loadUsers()">Refresh</button>
                    </div>
                    <div id="contact-list" class="contact-list">
                        <!-- Contacts will be loaded here -->
                    </div>
                </div>
            </div>

            <div class="chat-content">
                <!-- Welcome Screen -->
                <div id="welcome-screen" class="empty-chat">
                    <h1>WhatsApp Web</h1>
                    <p>Search for a phone number or select a contact.<br>Messages are encrypted and stored securely.</p>
                </div>

                <!-- Chat Area -->
                <div id="chat-area" class="hidden" style="display: flex; flex-direction: column; height: 100%;">
                    <div class="chat-header">
                        <div id="active-contact-avatar" class="contact-avatar"
                            style="width: 40px; height: 40px; margin-right: 15px;">?</div>
                        <div id="active-contact-name" style="font-weight: 600;">Recipient Name</div>
                        <div id="active-contact-id" style="font-size: 10px; color: #8696a0; margin-left: 10px;"></div>
                    </div>
                    <div id="messages"></div>
                    <div class="input-area">
                        <input id="messageInput" placeholder="Type a message">
                        <button class="login-btn" style="width: 80px; margin: 0;" onclick="sendMessage()">SEND</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let socket;
        let token;
        let myId;
        let activeReceiverId = null;
        let unreadCounts = {};

        const API_URL = 'http://localhost:3000/api/auth';
        const SOCKET_URL = 'http://localhost:3000';

        function showError(msg) {
            const banner = document.getElementById('error-banner');
            banner.innerText = msg;
            banner.style.display = 'block';
            setTimeout(() => { banner.style.display = 'none'; }, 5000);
        }

        async function register() {
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;
            try {
                const res = await fetch(`${API_URL}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone, password, name: 'User ' + phone.slice(-4) })
                });
                const data = await res.json();
                if (res.ok) alert(data.message || 'User created successfully!');
                else alert('Registration failed: ' + (data.error || 'Unknown error'));
            } catch (e) { showError('Backend unreachable'); }
        }

        async function login() {
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;
            try {
                const res = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone, password })
                });
                const data = await res.json();
                if (res.ok && data.token) {
                    token = data.token;
                    myId = data.user.id;
                    document.getElementById('user-display').innerText = data.user.phone;

                    document.getElementById('login-screen').classList.add('hidden');
                    document.getElementById('main-chat').style.display = 'flex';

                    connectSocket();
                    loadUsers();
                } else {
                    alert('Login failed: ' + (data.error || 'Invalid credentials'));
                }
            } catch (e) { showError('Backend unreachable'); }
        }

        async function searchUser() {
            const phone = document.getElementById('searchPhone').value.trim();
            if (!phone) return alert('Enter a phone number');

            try {
                const res = await fetch(`${API_URL}/search?phone=${phone}`);
                const user = await res.json();
                if (res.ok) {
                    selectContact(user);
                    loadUsers();
                } else {
                    alert('User not found. Make sure they are registered!');
                }
            } catch (e) { showError('Search failed'); }
        }

        async function loadUsers() {
            try {
                const res = await fetch(`${API_URL}/users`);
                const users = await res.json();
                const list = document.getElementById('contact-list');
                list.innerHTML = '';

                users.forEach(user => {
                    if (user.id === myId) return;

                    const div = document.createElement('div');
                    div.className = 'contact-item' + (user.id === activeReceiverId ? ' active' : '');
                    div.onclick = () => selectContact(user);

                    const unread = unreadCounts[user.id] ? `<div class="unread-badge">${unreadCounts[user.id]}</div>` : '';

                    div.innerHTML = `
                        <div class="contact-avatar">${(user.name || user.phone)[0]}</div>
                        <div class="contact-info">
                            <div class="contact-name">${user.name || user.phone}</div>
                            <div class="contact-phone">${user.phone}</div>
                        </div>
                        ${unread}
                    `;
                    list.appendChild(div);
                });
            } catch (e) { console.error('Failed to load users'); }
        }

        async function fetchHistory(otherId) {
            try {
                const res = await fetch(`${API_URL}/messages/${otherId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const messages = await res.json();
                const container = document.getElementById('messages');
                container.innerHTML = '';
                messages.forEach(msg => {
                    appendMessage(msg.content, msg.senderId === myId ? 'me' : 'other', msg.createdAt);
                });
            } catch (e) { showError('Failed to load chat history'); }
        }

        function selectContact(user) {
            activeReceiverId = user.id;
            unreadCounts[user.id] = 0; // Clear unread

            document.getElementById('welcome-screen').classList.add('hidden');
            document.getElementById('chat-area').classList.remove('hidden');
            document.getElementById('active-contact-name').innerText = user.name || user.phone;
            document.getElementById('active-contact-avatar').innerText = (user.name || user.phone)[0];
            document.getElementById('active-contact-id').innerText = `ID: ${user.id}`;

            fetchHistory(user.id);
            loadUsers();
        }

        function copyMyId() {
            navigator.clipboard.writeText(myId);
            alert('My ID copied: ' + myId);
        }

        function connectSocket() {
            socket = io(SOCKET_URL, { auth: { token } });

            socket.on('receive_message', (msg) => {
                if (msg.senderId === activeReceiverId) {
                    appendMessage(msg.content, 'other', msg.createdAt);
                } else {
                    unreadCounts[msg.senderId] = (unreadCounts[msg.senderId] || 0) + 1;
                    const senderDisplay = msg.sender?.name || msg.sender?.phone || 'Someone';
                    showError(`New message from ${senderDisplay}!`);
                    loadUsers();
                }
            });

            socket.on('message_sent', (msg) => {
                appendMessage(msg.content, 'me', msg.createdAt);
            });

            socket.on('error', (err) => {
                showError('Server Error: ' + (err.message || 'Failed to send message'));
            });

            socket.on('connect_error', (err) => {
                showError('Connection Lost: ' + err.message);
            });
        }

        function sendMessage() {
            const content = document.getElementById('messageInput').value;
            if (!activeReceiverId) return alert('Search for a user first');
            if (!content) return;

            socket.emit('send_message', { receiverId: activeReceiverId, content });
            document.getElementById('messageInput').value = '';
        }

        function appendMessage(text, type, time) {
            const date = time ? new Date(time) : new Date();
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.innerHTML = `
                ${text}
                <div class="msg-footer">${date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</div>
            `;
            const container = document.getElementById('messages');
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>

</html>
